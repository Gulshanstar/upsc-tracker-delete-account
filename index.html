<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Tracker - App Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
        }
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-card {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            text-decoration: none;
            color: #2d3748;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .link-card:hover {
            background: #edf2f7;
            border-color: #667eea;
            transform: translateY(-2px);
        }
        .link-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 20px;
        }
        .link-text {
            text-align: left;
        }
        .link-text h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .link-text p {
            font-size: 13px;
            color: #718096;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #a0aec0;
            font-size: 14px;
        }
        .contact {
            margin-top: 10px;
            color: #667eea;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="UPSC Tracker Logo">
        </div>
        <h1>UPSC Tracker</h1>
        <p class="subtitle">App Support</p>

        <div class="links">
            <!-- <a href="privacy-policy.html" class="link-card">
                <div class="link-icon">🛡️</div>
                <!-- <div class="link-text">
                    <h3>Privacy Policy</h3>
                    <p>Learn how we collect, use, and protect your data</p>
                </div> -->
            <!-- </a> -->

            <a href="delete-account.html" class="link-card">
                <div class="link-icon">🗑️</div>
                <div class="link-text">
                    <h3>Delete Account</h3>
                    <p>Request to delete your account and all associated data</p>
                </div>
            </a>
        </div>

        <div class="footer">
            <p>UPSC Tracker App</p>
            <p style="font-size: 12px; margin-top: 5px;">Package: com.upsctracker.app</p>
            <p style="margin-top: 10px;">
                Contact: <a href="mailto:amigulshanmundri@gmail.com" class="contact">amigulshanmundri@gmail.com</a>
            </p>
        </div>
    </div>
</body>
</html>
